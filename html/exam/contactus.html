    <h1 align="center">Contact Us</h1>
    <p>If you have any questions or feedback, please feel free to contact us using the information below:</p>
    <form action="" method="get">
        <fieldset>
            <legend>Contact Information</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="number">Phone Number:</label>
            <input type="tel" id="number" name="number" maxlength="10" pattern="[0-9]{10}" required><br><br>

            <label for="communication">type of communication:</label><br>
            <select id="communication" name="communication" required>
                <option value="type of communication:">Select...</option>
                <option value="">Sales</option>
                <option value="general">Service</option>
                <option value="feedback">enquiry</option>
                <option value="report">advertisement or complaint</option>
            </select><br><br>
                <label for="message">description:</label><br>
            <textarea id="message" name="message" required></textarea><br><br>
            <input type="submit" value="Submit">
        </fieldset>
    </form>
    <p align="center">&copy; 2023 News Web. All rights reserved.</p>
</body>
</html>
