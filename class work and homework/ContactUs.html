<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">Contact Us</h1>
   <form action="newspaper.html" align="center"method="get">
     <fieldset>
    <legend>Contact us</legend>
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="full name" required><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="email" required><br><br>
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" maxlength="10" placeholder="phone no" pattern="[0-9]{10}" required><br><br>
    <label for="subject">Subject:</label><br><br>
    <select name="subj" id="">
        <option value="aiml">Artificial Intelligence and Machine Learning</option>
        <option value="java fullstack">Java Full Stack</option>
        <option value="mern stack">MERN Stack</option>
        <option value="other">Other</option>
    </select><br><br>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
    <input type="submit">
    </fieldset>
   </form>
        <p style="position: fixed; bottom: 0; width: 100%; text-align: center;">&copy; 2024 Newspaper Inc. All rights reserved.</p>
</body>
</html>
